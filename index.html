<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/css/reset.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <title>TD List</title>
</head>
<body>

    <h1>To Do List</h1>
    <div>
        <input id="input" type="text" placeholder="add a task">
        <button id="add-btn">
            <span class="material-symbols-rounded">add</span>
        </button>
    </div>
    <button id="all-btn">
        <span class="material-symbols-rounded all-btn">format_list_bulleted</span>
        all
    </button>
    <button id="active-btn">
        <span class="material-symbols-rounded active-btn">playlist_remove</span>
        active
    </button>
    <button id="completed-btn">
        <span class="material-symbols-rounded">playlist_add_check</span>
        completed
    </button>
    <ul id="to-do-list"></ul>
    <button id="clear-all-btn">
        <span class="material-symbols-rounded">clear_all</span>
        clear all
    </button>

    <script type="module" src="/dist/js/app.js"></script>
    <script type="module" src="/dist/js/filter-buttons.js"></script>
    <style>
        body {
            text-align: center;
        }
    </style>
    <style>
        .all-btn {
            font-size: 23px;
        }
        </style>
</body>
</html>

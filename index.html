<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/css/reset.css">
    <link rel="stylesheet" href="/dist/css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <title>TD List</title>
</head>
<body>
    <main class="main">
        <h1 class="title">To-Do-List</h1>
        <section id="to-do-secton" class="to__do__section">
            <div class="input-container">
                <input id="input" type="text" placeholder="" class="input">
                <button id="add-btn" class="add__btn" title="add new task">
                    <span class="material-symbols-rounded">add</span>
                </button>
            </div>
            <section class="filter__buttons">
                <button id="all-btn" class="all__btn">
                    <span class="material-symbols-rounded all-btn">format_list_bulleted</span>
                </button>
                <label for="all-btn">All</label>
                <button id="active-btn" class="active__btn">
                    <span class="material-symbols-rounded active-btn">playlist_remove</span>
                </button>
                <label for="active-btn">Active</label>
                <button id="completed-btn" class="completed__btn">
                    <span class="material-symbols-rounded">playlist_add_check</span>
                </button>
                <label for="completed-btn">Completed</label>
            </section>
            <ul id="to-do-list" class="list__container"></ul>
            <section class="footer">
                <p class="edit__message">Double-click to edit a todo</p>
                <div class="clear__all__container">
                    <button id="clear-all-btn" class="clear__all__btn">
                        <span class="material-symbols-rounded">clear_all</span>
                    </button>
                    <label for="clear-all-btn" class="clear__all__label">Clear All</label>
                </div>
            </section>

        </section>
    </main>
   
    <script type="module" src="/dist/js/app.js"></script>
    <script type="module" src="/dist/js/filter-buttons.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/css/reset.css">
    <title>TD List</title>
</head>
<body>

    <h1>To Do List</h1>
    <div>
        <input id="input" type="text" placeholder="add a task">
        <button id="add-btn">+</button>
    </div>
    <button id="all-btn">all</button>
    <button id="active-btn">active</button>
    <button id="completed-btn">completed</button>
    <ul id="to-do-list"></ul>

    <script type="module" src="/dist/js/app.js"></script>
    <script type="module" src="/dist/js/filter-buttons.js"></script>
    <style>
        body {
            text-align: center;
        }
    </style>
</body>
</html>
